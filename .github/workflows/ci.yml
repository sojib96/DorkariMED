name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: pharmacy_marketplace

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with Ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.5
        env:
          POSTGRES_DB: pharmacy_marketplace
          POSTGRES_USER: pharmacy_user
          POSTGRES_PASSWORD: pharmacy_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils libproj-dev gdal-bin
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest --cov --cov-report=term-missing --cov-fail-under=80
        env:
          DJANGO_SETTINGS_MODULE: pharmacy_marketplace.settings.dev
          DB_HOST: localhost
          DB_NAME: pharmacy_marketplace
          DB_USER: pharmacy_user
          DB_PASSWORD: pharmacy_pass
          DJANGO_SECRET_KEY: ci-test-key
          DJANGO_DEBUG: "True"
