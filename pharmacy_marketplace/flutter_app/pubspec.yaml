name: pharmacy_marketplace
description: Pharmacy & Medicine Discovery Platform — Mobile App
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2
  go_router: ^14.6.2
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # HTTP / API
  dio: ^5.7.0
  # Storage
  flutter_secure_storage: ^9.2.4
  # UI
  flutter_svg: ^2.0.16
  google_maps_flutter: ^2.10.0
  # Location
  geolocator: ^13.0.2
  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
